<div class="config-collapsible-section">
  <div class="collapsible-header" data-toggle="general-section" tabindex="0">
    <span>Configuración General</span>
    <span class="collapsible-icon">▼</span>
  </div>
  <div class="collapsible-content general-section" style="display: none;">
    <div class="config-general-section">
      <label for="language-select" class="config-label">
        Idioma
      </label>
      <select id="language-select" class="config-select styled-select" data-field="language">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="it">Italiano</option>
        <option value="de">Deutsch</option>
      </select>
      <div class="advanced-http-toggle-row" style="margin-top: 1.5rem;">
        <input type="checkbox" id="advanced-http-config-toggle" class="advanced-http-toggle-checkbox" data-field="advancedHttp" />
        <label for="advanced-http-config-toggle" class="config-label advanced-http-toggle-label">
          Configuración HTTP Avanzada
        </label>
      </div>
    </div>
  </div>
</div>

<div class="config-collapsible-section">
  <div class="collapsible-header" data-toggle="export-section" tabindex="0">
    <span>Exportar / Importar</span>
    <span class="collapsible-icon">▼</span>
  </div>
  <div class="collapsible-content export-section" style="display: none;">
    <div class="config-export-section">
      <button class="btn btn-primary" data-action="export">
        Exportar Datos
      </button>
      <label class="btn btn-success" style="margin-left: 1rem; cursor:pointer;">
        Importar Datos
        <input type="file" accept="application/json" data-action="import" style="display:none;">
      </label>
    </div>
  </div>
</div>
