<div data-cy="lib-e2e-cypress-for-dummys">

  <!-- Advanced Editor Button -->
  <button class="advanced-editor-icon-button tooltip" data-action="advanced-editor">
    🛠️
    <span class="tooltip-text" data-i18n="MAIN_FRAME.SHOW_ADVANCED_EDITOR">Editor avanzado</span>
  </button>

  <!-- Record Button (Main) -->
  <button class="e2e-recorder-button tooltip" data-action="record" accesskey="r">
    Grabar
  </button>

  <!-- Saved Tests Button -->
  <button class="saved-test-icon-button tooltip" data-action="saved-tests">
    📋
    <span class="tooltip-text" data-i18n="MAIN_FRAME.SHOW_SAVED_TESTS">Ver pruebas guardadas</span>
  </button>

  <!-- Commands Button -->
  <button class="test-icon-button tooltip right-edge" data-action="commands">
    📝
    <span class="tooltip-text" data-i18n="MAIN_FRAME.SHOW_COMMANDS">Previsualizar comandos Cypress</span>
  </button>

  <!-- Settings Button -->
  <button class="gear-icon-button tooltip right-edge" data-action="settings">
    ⚙️
    <span class="tooltip-text" data-i18n="MAIN_FRAME.SETTINGS">Configuración</span>
  </button>

  <div id="commands-modal-container"></div>
  <div id="saved-tests-modal-container"></div>
  <div id="save-test-modal-container"></div>
  <div id="settings-modal-container"></div>
  <div id="advanced-editor-modal-content"></div>
</div>
